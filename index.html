<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SHARK BUCKS - ELITE EDITION</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Cairo:wght@400;700&display=swap');

        :root {
            --primary: #FCD535; --bg: #080a0f; --card: rgba(30, 35, 41, 0.7);
            --green: #0ecb81; --red: #f6465d; --neon: #00f2ff;
        }

        body {
            background-color: var(--bg); color: white;
            font-family: 'Cairo', sans-serif; margin: 0; padding: 0; overflow: hidden;
            background-image: radial-gradient(circle at top right, rgba(0,242,255,0.05), transparent);
        }

        /* --- Global Scaffolding --- */
        .app-container { height: 100vh; display: flex; flex-direction: column; }
        .header {
            padding: 20px; background: rgba(11, 14, 17, 0.95);
            border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center;
        }
        .bal-group { display: flex; flex-direction: column; }
        .bal-label { font-size: 10px; color: #848e9c; letter-spacing: 1px; }
        .bal-val { font-family: 'Orbitron'; font-size: 20px; font-weight: 900; color: var(--primary); text-shadow: 0 0 10px rgba(252,213,53,0.3); }

        .main-content { flex: 1; overflow-y: auto; padding-bottom: 100px; }
        .page { display: none; padding: 15px; animation: slideUp 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .page.active { display: block; }
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* --- Home: The Beast --- */
        .shark-podium { height: 50vh; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .glow-effect { position: absolute; width: 300px; height: 300px; background: radial-gradient(circle, rgba(0,242,255,0.1) 0%, transparent 70%); animation: pulse 3s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.5; } 50% { transform: scale(1.2); opacity: 1; } }
        .main-img { width: 320px; height: 320px; background-size: contain; background-repeat: no-repeat; background-position: center; z-index: 5; filter: drop-shadow(0 10px 30px rgba(0,0,0,0.8)); transition: 0.1s; }
        .main-img:active { transform: scale(0.9) rotate(2deg); }

        /* --- Professional Trading Chart --- */
        .chart-card { background: var(--card); border-radius: 16px; padding: 20px; border: 1px solid rgba(255,255,255,0.05); backdrop-filter: blur(10px); }
        .chart-engine {
            width: 100%; height: 220px; background: #0b0e11; border-radius: 8px;
            margin: 15px 0; display: flex; align-items: flex-end; gap: 5px; padding: 10px; box-sizing: border-box; overflow: hidden;
            border-left: 1px solid #1e2329; border-bottom: 1px solid #1e2329;
        }
        .candle { flex: 1; position: relative; min-width: 12px; height: 100%; display: flex; align-items: center; justify-content: center; }
        .c-body { width: 100%; border-radius: 2px; position: relative; transition: height 0.6s ease; }
        .c-wick { position: absolute; width: 1.5px; height: 140%; left: 50%; transform: translateX(-50%); background: inherit; opacity: 0.6; }

        /* --- Evolution Beast Cards --- */
        .beast-card {
            background: linear-gradient(135deg, rgba(30,35,41,0.9) 0%, rgba(11,14,17,0.9) 100%);
            border-radius: 24px; padding: 20px; margin-bottom: 20px; display: flex; align-items: center; gap: 20px;
            border: 1px solid rgba(255,255,255,0.08); position: relative; overflow: hidden;
        }
        .beast-card.active { border: 1px solid var(--neon); box-shadow: 0 0 20px rgba(0,242,255,0.15); }
        .beast-card img { width: 100px; height: 100px; object-fit: contain; z-index: 2; }
        .beast-info { flex: 1; z-index: 2; }
        .beast-info h3 { margin: 0; color: var(--primary); font-family: 'Orbitron'; font-size: 16px; }

        /* --- Premium Navbar --- */
        .navbar {
            position: fixed; bottom: 15px; left: 15px; right: 15px; height: 75px;
            background: rgba(22, 26, 30, 0.95); border-radius: 20px; backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-around; align-items: center; z-index: 1000;
        }
        .nav-item { color: #5e6673; text-align: center; font-size: 10px; cursor: pointer; transition: 0.3s; font-weight: bold; }
        .nav-item.active { color: var(--primary); transform: translateY(-5px); }
        .nav-item i { font-size: 24px; display: block; margin-bottom: 4px; }

        /* --- UI Elements --- */
        .btn-p { width: 100%; border: none; padding: 16px; border-radius: 12px; font-weight: 900; font-family: 'Orbitron'; cursor: pointer; transition: 0.2s; }
        .btn-sell { background: linear-gradient(90deg, var(--red), #800); color: white; box-shadow: 0 4px 15px rgba(246,70,93,0.3); }
        .tap-effect { position: absolute; color: var(--primary); font-family: 'Orbitron'; font-weight: 900; font-size: 28px; pointer-events: none; animation: tapFly 0.8s ease-out forwards; z-index: 100; }
        @keyframes tapFly { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(-120px) scale(1.5); } }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header">
            <div class="bal-group">
                <span class="bal-label">TOTAL POWER</span>
                <span id="top-bal" class="bal-val">0</span>
            </div>
            <div class="bal-group" style="text-align: right;">
                <span class="bal-label">TON ASSETS</span>
                <span id="top-ton" class="bal-val" style="color:white; font-size: 16px;">0.0000</span>
            </div>
        </div>

        <div class="main-content">
            <div id="page-home" class="page active">
                <div class="shark-podium">
                    <div class="glow-effect"></div>
                    <div id="shark-body" class="main-img" onclick="handleTap(event)"></div>
                    <div style="width: 85%; margin-top: 30px;">
                        <div style="height: 10px; background: rgba(255,255,255,0.05); border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); overflow: hidden;">
                            <div id="energy-bar" style="width: 100%; height: 100%; background: var(--primary); box-shadow: 0 0 15px var(--primary);"></div>
                        </div>
                        <div style="display: flex; justify-content: space-between; font-size: 12px; margin-top: 12px; color: #848e9c; font-weight: bold;">
                            <span id="energy-txt">⚡ 1000 / 1000</span>
                            <span id="level-name" style="color: var(--neon);">EVO 1: BABY</span>
                        </div>
                    </div>
                </div>
            </div>

            <div id="page-trade" class="page">
                <div class="chart-card">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                        <span style="font-family: 'Orbitron'; font-weight: 900;">SHARK / TON</span>
                        <span id="live-price" style="color: var(--green); font-family: 'Orbitron';">0.000100 ↑</span>
                    </div>
                    <div class="chart-engine" id="chart-container"></div>
                    <button class="btn-p btn-sell" onclick="sellProfit()">SELL ALL PROFITS</button>
                    <p style="text-align: center; color: #444; font-size: 10px; margin-top: 10px;">Market updates every 3 seconds</p>
                </div>
            </div>

            <div id="page-evo" class="page">
                <h2 style="color: var(--primary); text-align: center; font-family: 'Orbitron'; margin-bottom: 25px;">SHARK EVOLVE</h2>
                <div id="evo-list"></div>
            </div>

            <div id="page-tasks" class="page">
                <h2 style="color: var(--primary); font-family: 'Orbitron'; margin-bottom: 20px; border-left: 5px solid var(--primary); padding-left: 15px;">MISSIONS</h2>
                <div class="beast-card" style="padding: 15px;">
                    <div class="beast-info">
                        <h3>Follow on X</h3>
                        <p style="font-size: 12px; color: #848e9c;">Reward: 2,500 Shark</p>
                    </div>
                    <button style="background:var(--primary); border:none; padding:10px 20px; border-radius:8px; font-weight:bold;">GO</button>
                </div>
            </div>

            <div id="page-wallet" class="page">
                <h2 style="color: var(--primary); font-family: 'Orbitron';">VAULT</h2>
                <div class="beast-card" onclick="tg.showAlert('Your TON Deposit Address: xxxxxxx')">
                    <i class="fas fa-university" style="font-size: 30px; color: var(--green);"></i>
                    <div class="beast-info"><h3>Deposit Funds</h3><p>Instant TON Transfer</p></div>
                </div>
                <div class="beast-card" onclick="tg.showAlert('Withdrawal portal connected to Backend')">
                    <i class="fas fa-rocket" style="font-size: 30px; color: var(--red);"></i>
                    <div class="beast-info"><h3>Withdraw Profit</h3><p>Min Withdrawal: 0.5 TON</p></div>
                </div>
            </div>
        </div>

        <nav class="navbar">
            <div class="nav-item active" onclick="navTo('page-home', this)"><i class="fas fa-bolt"></i>TAP</div>
            <div class="nav-item" onclick="navTo('page-trade', this)"><i class="fas fa-chart-bar"></i>TRADE</div>
            <div class="nav-item" onclick="navTo('page-evo', this)"><i class="fas fa-dna"></i>EVO</div>
            <div class="nav-item" onclick="navTo('page-tasks', this)"><i class="fas fa-list-check"></i>TASKS</div>
            <div class="nav-item" onclick="navTo('page-wallet', this)"><i class="fas fa-wallet"></i>WALLET</div>
        </nav>
    </div>

    <script>
        const BEASTS = [
            { id: 1, name: "Baby Shark", power: 1, energy: 1000, img: "https://i.ibb.co/m5JxLzfb/1.png", cost: 0 },
            { id: 2, name: "Killer Shark", power: 6, energy: 3000, img: "https://i.ibb.co/275C3jvN/2.png", cost: 5 },
            { id: 3, name: "Warrior Shark", power: 18, energy: 8000, img: "https://i.ibb.co/ksRKfVxK/3.png", cost: 25 },
            { id: 4, name: "Mecha Shark", power: 60, energy: 20000, img: "https://i.ibb.co/SDMHCbnH/4.png", cost: 100 }
        ];

        let state = JSON.parse(localStorage.getItem('shark_elite_data')) || {
            bal: 0, ton: 0, nrg: 1000, lv: 1
        };

        const tg = window.Telegram.WebApp;
        tg.expand();

        function handleTap(e) {
            const s = BEASTS.find(x => x.id === state.lv);
            if (state.nrg <= 0) return;
            state.bal += s.power;
            state.nrg -= 1;
            updateUI();
            
            const tap = document.createElement('div');
            tap.className = 'tap-effect';
            tap.innerText = `+${s.power}`;
            tap.style.left = `${e.clientX}px`; tap.style.top = `${e.clientY}px`;
            document.body.appendChild(tap);
            setTimeout(() => tap.remove(), 800);

            tg.HapticFeedback.impactOccurred('medium');
            save();
        }

        // --- Binance Chart Logic ---
        let currentPrice = 0.000100;
        function updateChart() {
            const container = document.getElementById('chart-container');
            container.innerHTML = '';
            for (let i = 0; i < 20; i++) {
                const isGreen = Math.random() > 0.48;
                const candle = document.createElement('div');
                candle.className = 'candle';
                const body = document.createElement('div');
                body.className = 'c-body';
                body.style.height = (Math.random() * 70 + 10) + '%';
                body.style.backgroundColor = isGreen ? 'var(--green)' : 'var(--red)';
                const wick = document.createElement('div');
                wick.className = 'c-wick';
                body.appendChild(wick); candle.appendChild(body); container.appendChild(candle);
            }
            let drift = (Math.random() * 0.000006) - 0.000003;
            currentPrice += drift;
            document.getElementById('live-price').innerText = currentPrice.toFixed(6) + (drift > 0 ? ' ↑' : ' ↓');
            document.getElementById('live-price').style.color = drift > 0 ? 'var(--green)' : 'var(--red)';
        }

        function updateUI() {
            const s = BEASTS.find(x => x.id === state.lv);
            document.getElementById('top-bal').innerText = Math.floor(state.bal).toLocaleString();
            document.getElementById('top-ton').innerText = state.ton.toFixed(4);
            document.getElementById('energy-bar').style.width = (state.nrg / s.energy * 100) + '%';
            document.getElementById('energy-txt').innerText = `⚡ ${state.nrg} / ${s.energy}`;
            document.getElementById('shark-body').style.backgroundImage = `url('${s.img}')`;
            document.getElementById('level-name').innerText = `EVO ${s.id}: ${s.name.toUpperCase()}`;
        }

        function navTo(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
            if(id === 'page-trade') updateChart();
        }

        function renderEvo() {
            const list = document.getElementById('evo-list');
            list.innerHTML = '';
            BEASTS.forEach(s => {
                const active = state.lv === s.id;
                list.innerHTML += `
                    <div class="beast-card ${active ? 'active' : ''}">
                        <img src="${s.img}">
                        <div class="beast-info">
                            <h3>${s.name}</h3>
                            <p style="font-size:11px; color:#848e9c">Power: x${s.power} | Energy: ${s.energy}</p>
                            ${active ? '<span style="color:var(--green); font-weight:bold;">MAX LEVEL</span>' : `<button onclick="buyBeast(${s.id}, ${s.cost})" style="background:var(--primary); border:none; padding:8px 15px; border-radius:8px; font-weight:bold; margin-top:8px;">${s.cost} TON</button>`}
                        </div>
                    </div>
                `;
            });
        }

        function buyBeast(id, cost) {
            if (state.ton >= cost) {
                state.ton -= cost; state.lv = id;
                save(); updateUI(); renderEvo();
                tg.showAlert('Evolution Successful!');
            } else { tg.showAlert('Not enough TON!'); }
        }

        function sellProfit() {
            if (state.bal < 100) return tg.showAlert('Min 100 Shark to sell');
            state.ton += state.bal * currentPrice;
            state.bal = 0; save(); updateUI();
            tg.showAlert('Trade Successful!');
        }

        function save() { localStorage.setItem('shark_elite_data', JSON.stringify(state)); }

        setInterval(() => {
            const s = BEASTS.find(x => x.id === state.lv);
            if (state.nrg < s.energy) { state.nrg += 2; updateUI(); save(); }
        }, 2000);

        setInterval(updateChart, 3000);
        window.onload = () => { updateUI(); renderEvo(); updateChart(); };
    </script>
</body>
</html>
