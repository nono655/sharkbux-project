<script>
let balance = 0;
let energy = 1000;
let maxEnergy = 1000;
let ton = 0;

const tg = window.Telegram.WebApp;
tg.expand();

// 🔥 TAP SYSTEM + EFFECT
function tapShark(e) {
    if (energy <= 0) return;

    balance += getTapPower();
    energy -= 1;

    showFloatingText(e.clientX, e.clientY, "+1 🦈");
    shakeShark();

    updateUI();
    tg.HapticFeedback.impactOccurred('medium');
}

// 💥 Floating text
function showFloatingText(x, y, text) {
    const el = document.createElement("div");
    el.innerText = text;
    el.style.position = "fixed";
    el.style.left = x + "px";
    el.style.top = y + "px";
    el.style.color = "#00f2ff";
    el.style.fontWeight = "bold";
    el.style.pointerEvents = "none";
    el.style.transition = "all 1s ease";
    document.body.appendChild(el);

    setTimeout(() => {
        el.style.top = (y - 50) + "px";
        el.style.opacity = 0;
    }, 10);

    setTimeout(() => el.remove(), 1000);
}

// 🎯 قوة الضغط (قابلة للتطوير)
function getTapPower() {
    return 1; // تقدر تربطها بالترقيات
}

// ⚡ اهتزاز القرش
function shakeShark() {
    const shark = document.getElementById("shark-img");
    shark.style.transform = "scale(0.9)";
    setTimeout(() => shark.style.transform = "scale(1)", 100);
}

// 🔋 ENERGY REGEN (مهم بزاف)
setInterval(() => {
    if (energy < maxEnergy) {
        energy += 2;
        if (energy > maxEnergy) energy = maxEnergy;
        updateUI();
    }
}, 1000);

// 📊 تحديث الواجهة
function updateUI() {
    document.getElementById('bal').innerText = balance.toFixed(0);
    document.getElementById('ton').innerText = ton.toFixed(3);
    document.getElementById('nrg-bar').style.width = (energy / maxEnergy * 100) + "%";
    document.getElementById('nrg-text').innerText = `ENERGY: ${energy}/${maxEnergy}`;
}

// 🔥 MARKET SYSTEM (أفضل)
let price = 0.000100;

setInterval(() => {
    let change = (Math.random() - 0.5) * 0.00001;
    price += change;

    if (price < 0.00005) price = 0.00005;

    document.getElementById('live-price').innerText = price.toFixed(6) + " TON";
}, 2000);

// 💰 BUY / SELL
function trade(type) {
    if (type === "sell") {
        if (balance < 100) {
            alert("❌ Minimum 100 Shark");
            return;
        }

        let earned = balance * price;
        ton += earned;
        balance = 0;

        alert("💰 Sold! +" + earned.toFixed(4) + " TON");
    }

    if (type === "buy") {
        alert("🚧 Coming soon...");
    }

    updateUI();
}

// 📂 Navigation
function tab(id, el) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
    el.classList.add('active');
}

// 📊 Chart
const chart = document.getElementById('chart');

function createChart() {
    for (let i = 0; i < 40; i++) {
        let c = document.createElement('div');
        c.className = 'candle';
        chart.appendChild(c);
    }
}

setInterval(() => {
    const candles = document.querySelectorAll('.candle');
    candles.forEach(c => {
        let h = Math.random() * 80 + 10;
        c.style.height = h + "%";
        c.style.background = Math.random() > 0.5 ? "#2ed573" : "#ff4757";
    });
}, 2000);

createChart();
updateUI();
</script>
