<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SHARKBOX - PRO TRADER</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --blue: #00f2ff; --purple: #bc13fe; --bg: #02060c; --card: rgba(255,255,255,0.05); --red: #ff4757; --green: #2ed573; }
        body { background: var(--bg); color: white; font-family: 'Orbitron', sans-serif; margin: 0; overflow: hidden; }
        
        /* Header Stats */
        .top-nav { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; background: rgba(0,0,0,0.5); }
        .s-box { background: var(--card); padding: 10px; border-radius: 12px; text-align: center; border: 1px solid rgba(0,242,255,0.1); }
        .s-box .val { font-size: 18px; font-weight: 900; color: var(--blue); }
        .s-box .lab { font-size: 9px; color: #64748b; margin-top: 4px; }

        .page { display: none; height: 100vh; overflow-y: auto; padding: 20px 15px 150px; }
        .page.active { display: block; }

        /* Game Section - Real Muscle Sharks */
        .game-area { height: 45vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .shark-container { position: relative; transition: transform 0.05s; }
        .shark-container.hit { transform: scale(0.85); filter: brightness(1.2); }
        .main-shark-img { width: 300px; height: 300px; background-size: contain; background-repeat: no-repeat; background-position: center; }

        /* Trading Dashboard (New!) */
        .chart-v { width: 100%; height: 120px; background: #050a14; border-radius: 10px; margin: 15px 0; position: relative; overflow: hidden; border: 1px solid #1e293b; }
        .candle { width: 4px; position: absolute; bottom: 20%; border-radius: 2px; transition: 0.5s; }
        .trade-box { background: var(--card); border-radius: 15px; padding: 20px; border: 1px solid var(--blue); }
        .price-info { display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 14px; }
        .sell-btn { width: 100%; background: var(--red); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; font-size: 16px; box-shadow: 0 0 15px rgba(255,71,87,0.3); }

        /* Evolution Cards (Wide & Massive) */
        .evo-card { background: var(--card); border-radius: 20px; padding: 20px; margin-bottom: 15px; display: flex; align-items: center; gap: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .evo-card.active { border-color: var(--blue); background: rgba(0,242,255,0.05); }
        .evo-pview { width: 90px; height: 90px; background-size: contain; background-repeat: no-repeat; }

        /* Footer Nav */
        .nav { position: fixed; bottom: 20px; left: 5%; width: 90%; background: rgba(10,25,47,0.95); border-radius: 20px; display: flex; justify-content: space-around; padding: 12px 0; border: 1px solid rgba(0,242,255,0.2); }
        .nav-item { color: #475569; text-align: center; font-size: 10px; cursor: pointer; }
        .nav-item.active { color: var(--blue); text-shadow: 0 0 10px var(--blue); }
        .nav-item i { font-size: 24px; display: block; margin-bottom: 4px; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
</head>
<body>

    <div class="top-nav">
        <div class="s-box"><div class="val" id="sh-bal">0.00</div><div class="lab">SHARKI POWER</div></div>
        <div class="s-box"><div class="val" id="tn-bal" style="color:var(--purple)">0.0000</div><div class="lab">TON BALANCE</div></div>
    </div>

    <div id="game" class="page active">
        <div class="game-area">
            <div id="shark-hitbox" class="shark-container" onclick="punch(event)">
                <div id="main-shark" class="main-shark-img" style="background-image: url('https://i.ibb.co/LkhKq7q/shark1.png');"></div>
            </div>
            <div style="width:80%; margin-top:25px;">
                <div style="height:8px; background:rgba(255,255,255,0.1); border-radius:10px;"><div id="eb" style="width:100%; height:100%; background:var(--blue); box-shadow:0 0 10px var(--blue);"></div></div>
                <p id="et" style="text-align:center; font-size:11px; margin-top:10px; color:#64748b">ENERGY: 1000/1000</p>
            </div>
        </div>
    </div>

    <div id="trade" class="page">
        <h3 style="text-align:center; color:var(--blue)">SHARKI / TON MARKET</h3>
        <div class="chart-v" id="chart"></div>
        
        <div class="trade-box">
            <div class="price-info">
                <span>Current Price:</span>
                <span style="color:var(--green)" id="live-price">0.000105 TON</span>
            </div>
            <div style="margin-bottom:15px; font-size:12px; color:#888;">Wallet: <span id="sh-wallet">0.00</span> SHARKI</div>
            <button class="sell-btn" onclick="sellAll()">SELL ALL SHARKI</button>
        </div>
    </div>

    <div id="evo" class="page">
        <div class="evo-card active" id="c1">
            <div class="evo-pview" style="background-image: url('https://i.ibb.co/LkhKq7q/shark1.png');"></div>
            <div style="flex:1"><h4>Rookie Shark</h4><p style="font-size:11px; color:#888;">x1 Tap | 1k Energy</p></div>
            <div style="color:var(--blue); font-size:10px;">ACTIVE</div>
        </div>
        <div class="evo-card" id="c2">
            <div class="evo-pview" style="background-image: url('https://i.ibb.co/K2YgY0G/shark2.png');"></div>
            <div style="flex:1"><h4>Fighter Shark</h4><p style="font-size:11px; color:#888;">x3 Tap | 2.5k Energy</p></div>
            <button style="background:var(--blue); border:none; padding:8px 12px; border-radius:8px; font-weight:bold;">5 TON</button>
        </div>
        </div>

    <nav class="nav">
        <div class="nav-item active" onclick="sh('game',this)"><i class="fas fa-hand-fist"></i>TAP</div>
        <div class="nav-item" onclick="sh('trade',this)"><i class="fas fa-chart-line"></i>TRADE</div>
        <div class="nav-item" onclick="sh('evo',this)"><i class="fas fa-dna"></i>EVO</div>
        <div class="nav-item" onclick="sh('tasks',this)"><i class="fas fa-tasks"></i>TASKS</div>
    </nav>

    <script>
        let bal = 0; let nrg = 1000; let multi = 1;
        const tg = window.Telegram.WebApp; tg.expand();

        function punch(e) {
            if(nrg <= 0) return;
            bal += multi; nrg -= 1;
            document.getElementById('sh-bal').innerText = bal.toFixed(2);
            document.getElementById('sh-wallet').innerText = bal.toFixed(2);
            document.getElementById('eb').style.width = (nrg/10) + '%';
            
            const h = document.getElementById('shark-hitbox');
            h.classList.add('hit');
            setTimeout(() => h.classList.remove('hit'), 50);
            tg.HapticFeedback.impactOccurred('heavy');
        }

        // Fake Chart Movement
        function initChart() {
            const chart = document.getElementById('chart');
            for(let i=0; i<30; i++) {
                let c = document.createElement('div');
                c.className = 'candle';
                c.style.left = (i * 12) + 'px';
                let h = Math.random() * 60 + 20;
                c.style.height = h + 'px';
                c.style.background = Math.random() > 0.5 ? '#2ed573' : '#ff4757';
                chart.appendChild(c);
            }
        }
        setInterval(() => {
            const candles = document.querySelectorAll('.candle');
            candles.forEach(c => {
                let h = Math.random() * 60 + 20;
                c.style.height = h + 'px';
                c.style.background = Math.random() > 0.5 ? '#2ed573' : '#ff4757';
            });
            let p = (0.0001 + (Math.random() * 0.00001)).toFixed(6);
            document.getElementById('live-price').innerText = p + " TON";
        }, 2000);

        function sh(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        }
        initChart();
    </script>
</body>
</html>
