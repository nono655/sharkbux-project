<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SHARKBOX EVOLUTION</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --neon-blue: #00f2ff; --neon-purple: #bc13fe; --dark-core: #02060c; --gold: #f1c40f; }
        body { background: radial-gradient(circle at top, #0a192f 0%, var(--dark-core) 100%); color: white; font-family: 'Orbitron', sans-serif; margin: 0; overflow: hidden; user-select: none; }
        
        .stats-header { display: flex; justify-content: space-between; padding: 20px; background: rgba(255, 255, 255, 0.03); border-bottom: 1px solid rgba(0, 242, 255, 0.2); }
        .val { font-size: 20px; font-weight: 900; text-shadow: 0 0 10px var(--neon-blue); }
        .label { font-size: 9px; color: #64748b; letter-spacing: 1px; }

        .page { display: none; height: 100vh; overflow-y: auto; padding: 20px 20px 150px; box-sizing: border-box; }
        .page.active { display: block; animation: fadeIn 0.3s forwards; }
        @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }

        /* Game Zone */
        .game-zone { height: 50vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .shark-wrapper { position: relative; transition: transform 0.05s; }
        .shark-img { width: 240px; height: 240px; background-size: contain; background-repeat: no-repeat; background-position: center; filter: drop-shadow(0 0 20px var(--neon-blue)); }
        .hit { transform: scale(0.9) translateY(10px); filter: brightness(1.5) drop-shadow(0 0 30px #ff003c); }

        /* Plans/Upgrades */
        .plan-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 15px; margin-bottom: 15px; display: flex; align-items: center; justify-content: space-between; }
        .plan-active { border-color: var(--neon-blue); background: rgba(0, 242, 255, 0.05); }
        .plan-info h4 { margin: 0; color: var(--neon-blue); }
        .plan-info p { margin: 5px 0 0; font-size: 11px; color: #aaa; }
        .buy-btn { background: var(--neon-blue); color: #000; border: none; padding: 8px 15px; border-radius: 8px; font-weight: bold; font-size: 12px; }
        .current-tag { color: var(--gold); font-size: 10px; font-weight: bold; }

        /* Nav */
        .nav-bar { position: fixed; bottom: 20px; left: 5%; width: 90%; background: rgba(10, 25, 47, 0.95); border: 1px solid var(--neon-blue); border-radius: 20px; display: flex; justify-content: space-around; padding: 12px; }
        .nav-btn { color: #475569; font-size: 18px; transition: 0.3s; text-align: center; }
        .nav-btn.active { color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue); }
        .nav-btn span { display: block; font-size: 8px; margin-top: 4px; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
</head>
<body>

    <div class="stats-header">
        <div><div class="val" id="sh-bal">0.00</div><div class="label">SHARKI POWER</div></div>
        <div style="text-align:right"><div class="val" id="tn-bal" style="color:var(--neon-purple)">0.0000</div><div class="label">TON BALANCE</div></div>
    </div>

    <div id="game" class="page active">
        <div style="text-align: center; font-size: 12px; color: var(--gold);" id="current-plan-name">Plan: Free Shark</div>
        <div class="game-zone">
            <div class="shark-wrapper" id="shark-body" onclick="hitShark(event)">
                <div class="shark-img" id="main-shark-img" style="background-image: url('https://img.icons8.com/clouds/500/shark.png');"></div>
            </div>
            <div style="width:70%; height:6px; background:rgba(255,255,255,0.1); border-radius:10px; margin-top:20px;">
                <div id="energy-fill" style="width:100%; height:100%; background:var(--neon-blue); transition:0.1s;"></div>
            </div>
            <p id="nrg-txt" style="font-size:10px; margin-top:8px; color:#64748b">ENERGY: 1000/1000</p>
        </div>
    </div>

    <div id="plans" class="page">
        <h3 style="text-align:center; color:var(--neon-blue)">EVOLUTION CENTER</h3>
        
        <div class="plan-card plan-active" id="p1">
            <div class="plan-info">
                <h4>Baby Shark (Free)</h4>
                <p>1 Sharki/Tap | 1000 Energy</p>
            </div>
            <span class="current-tag">ACTIVE</span>
        </div>

        <div class="plan-card" id="p2">
            <div class="plan-info">
                <h4>Buff Shark</h4>
                <p>3 Sharki/Tap | 2000 Energy</p>
            </div>
            <button class="buy-btn" onclick="upgrade(2, 5)">5 TON</button>
        </div>

        <div class="plan-card" id="p3">
            <div class="plan-info">
                <h4>Cyber Shark</h4>
                <p>10 Sharki/Tap | 5000 Energy</p>
            </div>
            <button class="buy-btn" onclick="upgrade(3, 15)">15 TON</button>
        </div>
    </div>

    <div id="refs" class="page"><h3 style="text-align:center">REFERRALS</h3></div>
    <div id="wallet" class="page"><h3 style="text-align:center">WALLET</h3></div>

    <nav class="nav-bar">
        <div class="nav-btn active" onclick="nav('game', this)"><i class="fas fa-fist-raised"></i><span>HIT</span></div>
        <div class="nav-btn" onclick="nav('plans', this)"><i class="fas fa-bolt"></i><span>UPGRADE</span></div>
        <div class="nav-btn" onclick="nav('refs', this)"><i class="fas fa-users"></i><span>REFS</span></div>
        <div class="nav-btn" onclick="nav('wallet', this)"><i class="fas fa-wallet"></i><span>WALLET</span></div>
    </nav>

    <script>
        let power = 0;
        let nrg = 1000;
        let maxNrg = 1000;
        let multi = 1;
        const tg = window.Telegram.WebApp;
        tg.expand();

        // صور القروش لكل مستوى
        const sharkSkins = {
            1: 'https://img.icons8.com/clouds/500/shark.png', // ضعيف
            2: 'https://img.icons8.com/color/480/shark.png',  // معضل
            3: 'https://img.icons8.com/fluency/480/shark.png'  // اسطوري/سايبر
        };

        function hitShark(e) {
            if(nrg <= 0) return;
            power += multi;
            nrg -= 1;
            updateUI();

            const body = document.getElementById('shark-body');
            body.classList.add('hit');
            setTimeout(() => body.classList.remove('hit'), 50);
            tg.HapticFeedback.impactOccurred('medium');
        }

        function upgrade(level, cost) {
            // هنا مستقبلاً نربطها بخصم الرصيد من السيرفر
            if(confirm(`Do you want to upgrade to Level ${level} for ${cost} TON?`)) {
                if(level === 2) { 
                    multi = 3; maxNrg = 2000; nrg = 2000;
                    document.getElementById('main-shark-img').style.backgroundImage = `url('${sharkSkins[2]}')`;
                    document.getElementById('current-plan-name').innerText = "Plan: Buff Shark";
                }
                if(level === 3) { 
                    multi = 10; maxNrg = 5000; nrg = 5000;
                    document.getElementById('main-shark-img').style.backgroundImage = `url('${sharkSkins[3]}')`;
                    document.getElementById('current-plan-name').innerText = "Plan: Cyber Shark";
                }
                alert("Upgrade Successful!");
                nav('game', document.querySelector('.nav-btn'));
            }
        }

        function updateUI() {
            document.getElementById('sh-bal').innerText = power.toFixed(2);
            document.getElementById('nrg-txt').innerText = `ENERGY: ${nrg}/${maxNrg}`;
            document.getElementById('energy-fill').style.width = (nrg/maxNrg*100) + '%';
        }

        function nav(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            tg.HapticFeedback.selectionChanged();
        }

        // استعادة الطاقة تلقائياً
        setInterval(() => { if(nrg < maxNrg) { nrg += 1; updateUI(); } }, 2000);
    </script>
</body>
</html>
