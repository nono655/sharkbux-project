<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SHARK BUCKS - THE BEAST EDITION</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Cairo:wght@400;700&display=swap');

        :root {
            --yellow: #FCD535; --dark: #0B0E11; --card: #1E2329;
            --green: #0ecb81; --red: #f6465d; --neon: #00f2ff;
        }

        body {
            background-color: var(--dark); color: white;
            font-family: 'Cairo', sans-serif; margin: 0; overflow: hidden;
        }

        /* --- Header --- */
        .header {
            padding: 15px 20px; background: #161a1e;
            border-bottom: 1px solid #2b3139; display: flex; justify-content: space-between;
        }
        .bal-val { font-family: 'Orbitron'; color: var(--yellow); font-size: 18px; font-weight: 900; }

        /* --- Pages Layout --- */
        .content { height: 100vh; overflow-y: auto; padding-bottom: 100px; box-sizing: border-box; }
        .page { display: none; padding: 15px; }
        .page.active { display: block; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- Shark Main --- */
        .shark-stage { height: 45vh; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .shark-aura { position: absolute; width: 280px; height: 280px; background: radial-gradient(circle, rgba(0,242,255,0.2) 0%, transparent 75%); border-radius: 50%; z-index: 1; }
        .shark-main-img { width: 320px; height: 320px; background-size: contain; background-repeat: no-repeat; background-position: center; z-index: 2; transition: 0.1s; filter: drop-shadow(0 0 20px rgba(0,0,0,0.5)); }
        .shark-main-img:active { transform: scale(0.92); }

        /* --- Trading Binance Style --- */
        .binance-box { background: var(--card); border-radius: 8px; padding: 15px; border: 1px solid #2b3139; }
        .chart-v {
            width: 100%; height: 220px; background: #161a1e; border-radius: 4px;
            margin: 10px 0; display: flex; align-items: flex-end; gap: 4px; padding: 10px; overflow: hidden; position: relative;
        }
        .candle { flex: 1; position: relative; min-width: 10px; transition: 0.5s ease-in-out; }
        .c-body { width: 100%; border-radius: 1px; }
        .c-wick { position: absolute; width: 1px; height: 130%; left: 45%; top: -15%; background: inherit; opacity: 0.7; }
        
        /* --- Evo Cards (Powerful) --- */
        .evo-card {
            background: linear-gradient(145deg, #1e2329, #0b0e11);
            border: 1px solid #333; border-radius: 20px; padding: 20px;
            margin-bottom: 15px; display: flex; align-items: center; gap: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3); transition: 0.3s;
        }
        .evo-card.active { border-color: var(--neon); box-shadow: 0 0 15px rgba(0,242,255,0.2); }
        .evo-img-v { width: 110px; height: 110px; background-size: contain; background-repeat: no-repeat; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.8)); }

        /* --- Navbar (5 Tabs) --- */
        .nav {
            position: fixed; bottom: 0; width: 100%; height: 75px;
            background: #161a1e; border-top: 1px solid #2b3139;
            display: flex; justify-content: space-around; align-items: center; z-index: 1000;
        }
        .nav-link { color: #848e9c; text-align: center; font-size: 9px; cursor: pointer; transition: 0.3s; }
        .nav-link.active { color: var(--yellow); }
        .nav-link i { font-size: 20px; display: block; margin-bottom: 5px; }

        /* --- Animations --- */
        .tap-pop { position: absolute; color: var(--yellow); font-weight: 900; font-size: 24px; pointer-events: none; animation: pop 0.7s ease-out; }
        @keyframes pop { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-100px); } }
    </style>
</head>
<body>

    <div class="header">
        <div><span style="font-size: 10px; color: #848e9c;">SHARK POWER</span><br><span id="top-bal" class="bal-val">0.00</span></div>
        <div style="text-align: right;"><span style="font-size: 10px; color: #848e9c;">WALLET (TON)</span><br><span id="top-ton" class="bal-val" style="color:white">0.0000</span></div>
    </div>

    <div class="content">
        <div id="p-home" class="page active">
            <div class="shark-stage">
                <div class="shark-aura"></div>
                <div id="main-shark" class="shark-main-img" onclick="handleTap(event)"></div>
                <div style="width: 85%; margin-top: 25px;">
                    <div style="height: 8px; background: #2b3139; border-radius: 20px; overflow: hidden;">
                        <div id="energy-bar" style="width: 100%; height: 100%; background: var(--yellow); box-shadow: 0 0 10px var(--yellow);"></div>
                    </div>
                    <div style="display: flex; justify-content: space-between; font-size: 11px; margin-top: 10px; color: #848e9c;">
                        <span id="energy-txt">⚡ 1000 / 1000</span>
                        <span id="rank-txt" style="color:var(--yellow); font-weight:bold;">LEVEL 1</span>
                    </div>
                </div>
            </div>
        </div>

        <div id="p-trade" class="page">
            <div class="binance-box">
                <div style="display: flex; justify-content: space-between; font-family: 'Orbitron'; margin-bottom: 10px;">
                    <span>SHARK / TON</span>
                    <span id="price-tag" style="color: var(--green);">0.000100</span>
                </div>
                <div class="chart-v" id="chart-v"></div>
                <button onclick="sellAll()" style="width:100%; background:var(--red); color:white; border:none; padding:15px; border-radius:4px; font-weight:bold; font-size:16px;">SELL ALL SHARK</button>
            </div>
        </div>

        <div id="p-evo" class="page">
            <h3 style="color: var(--yellow); margin-bottom: 20px; text-align: center;">EVOLUTION LAB</h3>
            <div id="evo-container"></div>
        </div>

        <div id="p-tasks" class="page">
            <h3 style="color: var(--yellow); border-left: 4px solid var(--yellow); padding-left: 10px;">MISSIONS</h3>
            <div class="evo-card" style="padding: 15px;">
                <div style="flex: 1;">
                    <h4 style="margin: 0;">Join Official Channel</h4>
                    <p style="font-size: 11px; color: #848e9c;">+ 1,500 Shark Power</p>
                </div>
                <button style="background:var(--yellow); border:none; padding:8px 20px; border-radius:5px; font-weight:bold;">GO</button>
            </div>
        </div>

        <div id="p-wallet" class="page">
            <h3 style="color: var(--yellow);">VAULT</h3>
            <div class="evo-card" onclick="tg.showAlert('Deposit TON Address: xxxxxxx')">
                <i class="fas fa-arrow-down" style="color:var(--green); font-size: 24px;"></i>
                <div style="flex:1"><h4>Deposit TON</h4><p>Increase your balance instantly</p></div>
            </div>
            <div class="evo-card" onclick="tg.showAlert('Withdraw functionality connected to Bot API')">
                <i class="fas fa-paper-plane" style="color:var(--red); font-size: 24px;"></i>
                <div style="flex:1"><h4>Withdraw TON</h4><p>Min: 0.5 TON</p></div>
            </div>
        </div>
    </div>

    <nav class="nav">
        <div class="nav-link active" onclick="tab('p-home', this)"><i class="fas fa-hand-fist"></i>TAP</div>
        <div class="nav-link" onclick="tab('p-trade', this)"><i class="fas fa-chart-line"></i>TRADE</div>
        <div class="nav-link" onclick="tab('p-evo', this)"><i class="fas fa-dna"></i>EVO</div>
        <div class="nav-link" onclick="tab('p-tasks', this)"><i class="fas fa-check-double"></i>TASKS</div>
        <div class="nav-link" onclick="tab('p-wallet', this)"><i class="fas fa-wallet"></i>WALLET</div>
    </nav>

    <script>
        const SHARKS = [
            { id: 1, name: "Baby Shark", power: 1, energy: 1000, img: "https://i.ibb.co/m5JxLzfb/1.png", price: 0 },
            { id: 2, name: "Fighter Shark", power: 5, energy: 2500, img: "https://i.ibb.co/275C3jvN/2.png", price: 5 },
            { id: 3, name: "Warrior Shark", power: 15, energy: 6000, img: "https://i.ibb.co/ksRKfVxK/3.png", price: 20 },
            { id: 4, name: "Alpha Shark", power: 50, energy: 15000, img: "https://i.ibb.co/SDMHCbnH/4.png", price: 75 }
        ];

        let state = JSON.parse(localStorage.getItem('shark_ultra_data')) || {
            bal: 0, ton: 0, nrg: 1000, lv: 1
        };

        const tg = window.Telegram.WebApp;
        tg.expand();

        function handleTap(e) {
            const s = SHARKS.find(x => x.id === state.lv);
            if (state.nrg <= 0) return;
            state.bal += s.power;
            state.nrg -= 1;
            updateUI();
            
            const p = document.createElement('div');
            p.className = 'tap-pop';
            p.innerText = `+${s.power}`;
            p.style.left = `${e.clientX}px`; p.style.top = `${e.clientY}px`;
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 700);

            tg.HapticFeedback.impactOccurred('medium');
            save();
        }

        // --- نظام تداول بايننس (0.001 ذبذبة) ---
        let basePrice = 0.000100;
        function updateTrade() {
            const chart = document.getElementById('chart-v');
            chart.innerHTML = '';
            for (let i = 0; i < 20; i++) {
                const isUp = Math.random() > 0.45;
                const c = document.createElement('div');
                c.className = 'candle';
                const body = document.createElement('div');
                body.className = 'c-body';
                body.style.height = (Math.random() * 60 + 10) + '%';
                body.style.backgroundColor = isUp ? 'var(--green)' : 'var(--red)';
                const wick = document.createElement('div');
                wick.className = 'c-wick';
                body.appendChild(wick); c.appendChild(body); chart.appendChild(c);
            }
            
            // ذبذبة السعر بـ 0.001 سنت
            let change = (Math.random() * 0.000005) - 0.000002;
            basePrice += change;
            const tag = document.getElementById('price-tag');
            tag.innerText = basePrice.toFixed(6);
            tag.style.color = change > 0 ? 'var(--green)' : 'var(--red)';
        }
        setInterval(updateTrade, 3000);

        function updateUI() {
            const s = SHARKS.find(x => x.id === state.lv);
            document.getElementById('top-bal').innerText = state.bal.toLocaleString();
            document.getElementById('top-ton').innerText = state.ton.toFixed(4);
            document.getElementById('energy-bar').style.width = (state.nrg / s.energy * 100) + '%';
            document.getElementById('energy-txt').innerText = `⚡ ${state.nrg} / ${s.energy}`;
            document.getElementById('main-shark').style.backgroundImage = `url('${s.img}')`;
            document.getElementById('rank-txt').innerText = s.name.toUpperCase();
        }

        function tab(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
            if (id === 'p-trade') updateTrade();
        }

        function renderEvo() {
            const container = document.getElementById('evo-container');
            container.innerHTML = '';
            SHARKS.forEach(s => {
                const active = state.lv === s.id;
                container.innerHTML += `
                    <div class="evo-card ${active ? 'active' : ''}">
                        <div class="evo-img-v" style="background-image: url('${s.img}')"></div>
                        <div style="flex:1">
                            <h4 style="margin:0; color:var(--yellow)">${s.name}</h4>
                            <p style="font-size:11px; color:#848e9c">Power: x${s.power} | Energy: ${s.energy}</p>
                            ${active ? '<b style="color:var(--green)">OWNED</b>' : `<button onclick="buyEvo(${s.id}, ${s.price})" style="background:var(--yellow); border:none; padding:5px 15px; border-radius:5px; font-weight:bold; margin-top:5px;">${s.price} TON</button>`}
                        </div>
                    </div>
                `;
            });
        }

        function buyEvo(id, price) {
            if (state.ton >= price) {
                state.ton -= price; state.lv = id;
                save(); updateUI(); renderEvo();
                tg.showAlert('Evolution Complete!');
            } else { tg.showAlert('Not enough TON!'); }
        }

        function sellAll() {
            if (state.bal < 100) return tg.showAlert('Min sell: 100 Shark');
            state.ton += state.bal * basePrice;
            state.bal = 0; save(); updateUI();
            tg.showAlert('Sold for TON!');
        }

        function save() { localStorage.setItem('shark_ultra_data', JSON.stringify(state)); }

        setInterval(() => {
            const s = SHARKS.find(x => x.id === state.lv);
            if (state.nrg < s.energy) { state.nrg += 1; updateUI(); }
        }, 1000);

        window.onload = () => { updateUI(); renderEvo(); updateTrade(); };
    </script>
</body>
</html>
