<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SharkBox - Earn Sharki</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main-color: #2ecc71; --accent: #00d2ff; --bg: #f4f7f6; --text: #2c3e50; --card-bg: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; user-select: none; }
        
        /* الهيدر العلوي والرصيد */
        .top-bar { background: var(--card-bg); padding: 15px; border-bottom-left-radius: 20px; border-bottom-right-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); text-align: center; position: sticky; top: 0; z-index: 100; }
        .balance-box { display: flex; justify-content: space-around; align-items: center; margin-top: 10px; }
        .stat { flex: 1; }
        .stat-val { font-size: 20px; font-weight: bold; color: var(--main-color); }
        .stat-label { font-size: 12px; color: #7f8c8d; }

        /* الصفحات */
        .page { display: none; padding: 20px 15px 100px; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* زر النقر (Home) */
        .shark-tap-area { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 50vh; }
        .shark-btn { width: 180px; height: 180px; background: url('https://img.icons8.com/clouds/500/shark.png') no-repeat center; background-size: contain; transition: transform 0.1s; cursor: pointer; }
        .shark-btn:active { transform: scale(0.9); }
        .energy-bar-container { width: 80%; height: 10px; background: #ddd; border-radius: 5px; margin-top: 20px; overflow: hidden; }
        .energy-fill { height: 100%; background: var(--accent); width: 100%; transition: width 0.3s; }

        /* كروت المهام والاحالات */
        .card { background: var(--card-bg); border-radius: 15px; padding: 15px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 5px rgba(0,0,0,0.03); }
        .task-info { display: flex; align-items: center; gap: 10px; }
        .task-icon { font-size: 24px; color: var(--main-color); }
        .go-btn { background: var(--main-color); color: white; border: none; padding: 8px 20px; border-radius: 20px; font-weight: bold; }

        /* القائمة السفلية */
        .nav { position: fixed; bottom: 0; width: 100%; background: var(--card-bg); display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #eee; }
        .nav-item { text-align: center; font-size: 11px; color: #bdc3c7; flex: 1; cursor: pointer; }
        .nav-item.active { color: var(--main-color); }
        .nav-item i { font-size: 22px; display: block; margin-bottom: 2px; }

        /* الأزرار الكبيرة */
        .action-btn { background: var(--accent); color: white; border: none; width: 100%; padding: 15px; border-radius: 12px; font-size: 16px; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="top-bar">
        <strong>SharkBox 🦈</strong>
        <div class="balance-box">
            <div class="stat">
                <div class="stat-val" id="sharki-bal">0.00</div>
                <div class="stat-label">SHARKI</div>
            </div>
            <div class="stat" style="border-right: 1px solid #eee;">
                <div class="stat-val" id="ton-bal" style="color: #0088cc;">0.0000</div>
                <div class="stat-label">TON</div>
            </div>
        </div>
    </div>

    <div id="earn" class="page active">
        <div class="shark-tap-area" onclick="tapShark(event)">
            <div class="shark-btn"></div>
            <div class="energy-bar-container">
                <div class="energy-fill" id="energy-fill"></div>
            </div>
            <p id="energy-text">1000/1000</p>
        </div>
    </div>

    <div id="tasks" class="page">
        <h3 style="margin-top:0">📋 المهام المتاحة</h3>
        <div class="card">
            <div class="task-info">
                <i class="fab fa-telegram task-icon"></i>
                <div><div>انضم للقناة الرسمية</div><div style="color:var(--main-color); font-size:12px;">+10 SHARKI</div></div>
            </div>
            <button class="go-btn">ابدأ</button>
        </div>
        <button class="action-btn" style="background: #2c3e50;">➕ إضافة مهمة جديدة (قناة/رابط)</button>
    </div>

    <div id="refer" class="page">
        <h3>👥 دعوة الأصدقاء</h3>
        <div class="card" style="flex-direction: column; text-align: center;">
            <p>احصل على 0.005 TON عن كل إحالة ناجحة</p>
            <input type="text" value="https://t.me/SharkBoxBot?start=123" readonly style="width: 100%; padding: 10px; border: 1px dashed var(--main-color); text-align: center; margin-bottom: 10px;">
            <button class="go-btn" style="width: 100%;">نسخ الرابط</button>
        </div>
    </div>

    <div id="wallet" class="page">
        <h3>💰 الرصيد والعمليات</h3>
        <div class="card" style="display: block; text-align: center;">
            <p>حول عملة SHARKI إلى TON فوراً</p>
            <button class="go-btn" style="width: 80%; background: var(--accent);">تحويل SHARKI ➔ TON</button>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <button class="action-btn">📥 إيداع تلقائي</button>
            <button class="action-btn" style="background: #e74c3c;">📤 سحب TON</button>
        </div>
    </div>

    <nav class="nav">
        <div class="nav-item active" onclick="showP('earn', this)"><i class="fas fa-coins"></i>الربح</div>
        <div class="nav-item" onclick="showP('tasks', this)"><i class="fas fa-check-double"></i>المهام</div>
        <div class="nav-item" onclick="showP('refer', this)"><i class="fas fa-users"></i>الإحالة</div>
        <div class="nav-item" onclick="showP('wallet', this)"><i class="fas fa-wallet"></i>المحفظة</div>
    </nav>

    <script>
        let sharki = 0;
        let energy = 1000;
        const tg = window.Telegram.WebApp;
        tg.expand();

        function tapShark(e) {
            if(energy <= 0) return;
            sharki += 1;
            energy -= 1;
            updateUI();
            tg.HapticFeedback.impactOccurred('medium');
        }

        function updateUI() {
            document.getElementById('sharki-bal').innerText = sharki.toFixed(2);
            document.getElementById('energy-text').innerText = `${energy}/1000`;
            document.getElementById('energy-fill').style.width = (energy/10) + '%';
        }

        function showP(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
            tg.HapticFeedback.selectionChanged();
        }
    </script>
</body>
</html>
